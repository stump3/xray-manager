# ══════════════════════════════════════════════════════════════
#  Xray Manager — vhost шаблон
#  Устанавливать в: /etc/nginx/sites-available/vpn.conf
#  Активировать:    ln -s ../sites-available/vpn.conf sites-enabled/
#
#  Плейсхолдеры (заменяются install.sh автоматически):
#    DOMAIN     — ваш домен (vpn.example.com)
#    SUB_TOKEN  — токен подписки (генерируется случайно)
#    WS_PORT    — внутренний порт WebSocket inbound Xray
# ══════════════════════════════════════════════════════════════

# ── Редирект HTTP → HTTPS ─────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name DOMAIN;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── Основной HTTPS-сервер ────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name DOMAIN;

    # ── TLS-сертификат ────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/DOMAIN/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/DOMAIN/chain.pem;

    # OCSP Stapling
    ssl_stapling        on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;

    # ── Заглушка-сайт (маскировка) ───────────────────────────
    # Всё что не попадает в location ниже — отдаём заглушку
    root /var/www/html;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # ── VLESS + WebSocket + TLS ───────────────────────────────
    # Xray слушает на 127.0.0.1:WS_PORT
    location /ws {
        proxy_pass          http://127.0.0.1:WS_PORT;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade    $http_upgrade;
        proxy_set_header    Connection "upgrade";
        proxy_set_header    Host       $host;
        proxy_set_header    X-Real-IP  $remote_addr;
        proxy_read_timeout  86400s;
        proxy_send_timeout  86400s;
    }

    # ── Сервер подписки ───────────────────────────────────────
    # Доступен только через этот токен в URL
    location /SUB_TOKEN/ {
        proxy_pass          http://127.0.0.1:8888/;
        proxy_set_header    Host       $host;
        proxy_set_header    X-Real-IP  $remote_addr;
        proxy_read_timeout  30s;
    }

    # ── Дополнительные протоколы (раскомментировать по мере добавления) ──

    # VMess + WebSocket
    # location /vmess {
    #     proxy_pass         http://127.0.0.1:10002;
    #     proxy_http_version 1.1;
    #     proxy_set_header   Upgrade    $http_upgrade;
    #     proxy_set_header   Connection "upgrade";
    #     proxy_read_timeout 86400s;
    # }

    # VLESS + gRPC + TLS
    # location /vless-grpc {
    #     grpc_pass grpc://127.0.0.1:10003;
    #     grpc_read_timeout  86400s;
    #     grpc_send_timeout  86400s;
    # }

    # Trojan + TCP + TLS
    # Trojan слушает напрямую на 443 (конфликт с Nginx) —
    # либо используй отдельный порт, либо stream-блок ниже

    # VMess + HTTP/2 (gRPC требует grpc_pass)
    # location /vmess-grpc {
    #     grpc_pass grpc://127.0.0.1:10004;
    # }

    # VLESS + HTTPUpgrade + TLS
    # location /httpupgrade {
    #     proxy_pass         http://127.0.0.1:10005;
    #     proxy_http_version 1.1;
    #     proxy_set_header   Upgrade    $http_upgrade;
    #     proxy_set_header   Connection "upgrade";
    # }
}

