# ══════════════════════════════════════════════════════════════
#  Xray Manager — nginx vhost шаблон
#  Плейсхолдеры (заменяются install.sh):
#    DOMAIN          — ваш домен
#    SUB_TOKEN       — токен подписки
#    NGINX_PORT      — 443 (прямо) или 4443 (за nginx stream)
#    HTTP2_DIRECTIVE — '' или 'http2' (nginx < 1.25)
# ══════════════════════════════════════════════════════════════

server {
    listen 80;
    listen [::]:80;
    server_name DOMAIN;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen NGINX_PORT ssl HTTP2_DIRECTIVE;
    listen [::]:NGINX_PORT ssl HTTP2_DIRECTIVE;
    server_name DOMAIN;

    ssl_certificate      /etc/letsencrypt/live/DOMAIN/fullchain.pem;
    ssl_certificate_key  /etc/letsencrypt/live/DOMAIN/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/DOMAIN/chain.pem;

    ssl_protocols        TLSv1.2 TLSv1.3;
    ssl_session_cache    shared:SSL:10m;
    ssl_session_timeout  1d;
    ssl_stapling         on;
    ssl_stapling_verify  on;
    resolver             1.1.1.1 8.8.8.8 valid=300s;

    root /var/www/html;
    index index.html;
    location / { try_files $uri $uri/ =404; }

    location /SUB_TOKEN/ {
        proxy_pass       http://127.0.0.1:8888/;
        proxy_set_header Host      $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }

    # === Xray протоколы (добавляются автоматически при добавлении протокола) ===
    # XRAY_LOCATIONS_PLACEHOLDER
}
