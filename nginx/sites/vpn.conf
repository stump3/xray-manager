# ══════════════════════════════════════════════════════════════
#  Xray Manager — vhost шаблон
#  Устанавливать в: /etc/nginx/sites-available/vpn.conf
#  Активировать:    ln -s ../sites-available/vpn.conf sites-enabled/
#
#  Плейсхолдеры (заменяются install.sh):
#    DOMAIN      — ваш домен
#    SUB_TOKEN   — токен подписки
#    WS_PORT     — внутренний порт WebSocket
#    NGINX_PORT  — 443 (прямо) или 4443 (за nginx stream)
# ══════════════════════════════════════════════════════════════

# ── Редирект HTTP → HTTPS ─────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name DOMAIN;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── Основной HTTPS-сервер ─────────────────────────────────────
server {
    listen NGINX_PORT ssl HTTP2_DIRECTIVE;
    listen [::]:NGINX_PORT ssl;
    server_name DOMAIN;

    ssl_certificate     /etc/letsencrypt/live/DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/DOMAIN/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/DOMAIN/chain.pem;

    ssl_stapling        on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;

    # Заглушка-сайт
    root /var/www/html;
    index index.html;
    location / { try_files $uri $uri/ =404; }

    # VLESS + WebSocket
    location /ws {
        proxy_pass          http://127.0.0.1:WS_PORT;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade    $http_upgrade;
        proxy_set_header    Connection "upgrade";
        proxy_set_header    Host       $host;
        proxy_set_header    X-Real-IP  $remote_addr;
        proxy_read_timeout  86400s;
        proxy_send_timeout  86400s;
    }

    # Сервер подписки
    location /SUB_TOKEN/ {
        proxy_pass       http://127.0.0.1:8888/;
        proxy_set_header Host      $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }

    # VMess + WebSocket (раскомментировать при добавлении)
    # location /vmess {
    #     proxy_pass         http://127.0.0.1:10002;
    #     proxy_http_version 1.1;
    #     proxy_set_header   Upgrade    $http_upgrade;
    #     proxy_set_header   Connection "upgrade";
    #     proxy_read_timeout 86400s;
    # }

    # VLESS / Trojan + gRPC (grpc_pass, не proxy_pass)
    # location /grpc-service {
    #     grpc_pass grpc://127.0.0.1:10003;
    # }
}
