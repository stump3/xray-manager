# ══════════════════════════════════════════════════════════════
#  Xray Manager — базовый nginx.conf
#  Устанавливать в: /etc/nginx/nginx.conf
# ══════════════════════════════════════════════════════════════

user www-data;
worker_processes auto;
pid /run/nginx.pid;
include /etc/nginx/modules-enabled/*.conf;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {

    # ── Базовые настройки ─────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    types_hash_max_size 2048;
    server_tokens      off;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Логи ──────────────────────────────────────────────────
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    # ── Gzip ──────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json
               application/javascript text/xml application/xml
               application/xml+rss text/javascript;

    # ── SSL глобальные настройки ──────────────────────────────
    ssl_protocols              TLSv1.2 TLSv1.3;
    ssl_ciphers                ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers  off;
    ssl_session_timeout        1d;
    ssl_session_cache          shared:SSL:10m;
    ssl_session_tickets        off;

    # ── HTTP/2 ────────────────────────────────────────────────
    # http2 включается на уровне listen в site-конфиге

    # ── Защита заголовков ─────────────────────────────────────
    add_header X-Frame-Options         DENY          always;
    add_header X-Content-Type-Options  nosniff       always;
    add_header Referrer-Policy         no-referrer   always;

    # ── Upstream для gRPC-протоколов ──────────────────────────
    # Объявляй здесь если используешь grpc_pass в site-конфиге
    # upstream grpc_xray { server 127.0.0.1:PORT; }

    # ── Сайты ─────────────────────────────────────────────────
    include /etc/nginx/conf.d/*.conf;
    include /etc/nginx/sites-enabled/*;
}
